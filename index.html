<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel Number Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #06080c;
    --bg-card: #0c1018;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --text: #e4e8f1;
    --text-muted: #6b7394;
    --text-dim: #3d4566;
    --primary: #6C9CFF;
    --gradient: linear-gradient(135deg, #6C9CFF 0%, #c084fc 50%, #f472b6 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    width: 100%;
    max-width: 420px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(20px);
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 800;
    text-align: center;
    letter-spacing: -0.02em;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 8px;
    line-height: 1.6;
  }

  .form-group {
    margin-top: 32px;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .date-inputs {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr 0.8fr;
    gap: 10px;
  }

  input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    text-align: center;
    outline: none;
    transition: all 0.3s;
    -moz-appearance: textfield;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(108,156,255,0.1);
  }

  input::placeholder {
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  .btn {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--gradient);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.02em;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 30px rgba(108,156,255,0.25);
  }

  .btn:active {
    transform: translateY(0);
  }

  /* Result */
  .result {
    display: none;
    margin-top: 32px;
    text-align: center;
    animation: fadeUp 0.5s ease forwards;
  }

  .result.show { display: block; }

  .result-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .result-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 5rem;
    font-weight: 800;
    line-height: 1.1;
    margin-top: 8px;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-master {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 14px;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(192,132,252,0.1);
    color: #c084fc;
    border: 1px solid rgba(192,132,252,0.2);
  }

  .result-meaning {
    margin-top: 20px;
    padding: 24px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-align: left;
  }

  .result-meaning h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-meaning .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--primary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 16px;
    margin-bottom: 6px;
  }

  .result-meaning .section-label:first-of-type { margin-top: 0; }

  .result-meaning p {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 4px;
  }

  .result-meaning ul {
    list-style: none;
    padding: 0;
    margin: 6px 0 0 0;
  }

  .result-meaning li {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.7;
    padding: 3px 0 3px 16px;
    position: relative;
  }

  .result-meaning li::before {
    content: '◆';
    position: absolute;
    left: 0;
    color: var(--text-dim);
    font-size: 0.5rem;
    top: 7px;
  }

  .keyword-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .keyword-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 9999px;
    font-size: 0.7rem;
    font-weight: 500;
    background: rgba(108,156,255,0.06);
    color: var(--primary);
    border: 1px solid rgba(108,156,255,0.12);
  }

  .calc-steps {
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.8;
  }

  .error {
    color: #f472b6;
    font-size: 0.8rem;
    text-align: center;
    margin-top: 12px;
    display: none;
  }

  .error.show { display: block; }

  .share-section {
    margin-top: 24px;
    text-align: center;
  }

  .share-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .share-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    color: #fff;
  }

  .share-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.15);
  }

  .share-btn.x { background: #000; border: 1px solid rgba(255,255,255,0.12); }
  .share-btn.line { background: #06C755; }
  .share-btn.copy { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
  .share-btn.copy:hover { border-color: var(--primary); }

  .share-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .copied-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--primary);
    color: #fff;
    padding: 10px 24px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }

  .copied-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .footer {
    margin-top: 32px;
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .footer a {
    color: var(--primary);
    text-decoration: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

function calculate() {
  const y = document.getElementById('year').value;
  const m = document.getElementById('month').value;
  const d = document.getElementById('day').value;
  const err = document.getElementById('error');
  const result = document.getElementById('result');

  err.classList.remove('show');
  result.classList.remove('show');

  if (!y || !m || !d) { err.classList.add('show'); return; }

  const year = parseInt(y), month = parseInt(m), day = parseInt(d);
  if (year < 1900 || year > 2099 || month < 1 || month > 12 || day < 1 || day > 31) {
    err.classList.add('show'); return;
  }

  const date = new Date(year, month - 1, day);
  if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) {
    err.classList.add('show'); return;
  }

  const digits = `${year}${String(month).padStart(2,'0')}${String(day).padStart(2,'0')}`;
  const stepsArr = [];
  let sum = digits.split('').reduce((a, c) => a + parseInt(c), 0);
  stepsArr.push(`${digits.split('').join(' + ')} = ${sum}`);

  while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
    const prev = sum;
    sum = String(prev).split('').reduce((a, c) => a + parseInt(c), 0);
    stepsArr.push(`${String(prev).split('').join(' + ')} = ${sum}`);
  }

  document.getElementById('number').textContent = sum;
  document.getElementById('steps').innerHTML = stepsArr.join('<br>');

  const isMaster = [11, 22, 33].includes(sum);
  document.getElementById('masterBadge').innerHTML = isMaster
    ? `<span class="result-master">Master Number</span>` : '';

  const info = meanings[sum];
  if (info) {
    const kwHtml = info.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('');
    const strHtml = info.strengths.map(s => `<li>${s}</li>`).join('');
    const chaHtml = info.challenges.map(c => `<li>${c}</li>`).join('');
    document.getElementById('meaning').innerHTML = `
      <h3>${info.title}</h3>
      <div class="keyword-tags">${kwHtml}</div>
      <div class="section-label">性格・特徴</div>
      <p>${info.personality}</p>
      <div class="section-label">強み</div>
      <ul>${strHtml}</ul>
      <div class="section-label">課題</div>
      <ul>${chaHtml}</ul>
      <div class="section-label">メッセージ</div>
      <p>${info.advice}</p>
      <div class="section-label">相性の良いナンバー</div>
      <p><span style="color:var(--accent-green)">◎ ${info.goodMatch.join(', ')}</span></p>
      <p style="font-size:0.8rem">${info.goodMatchWhy}</p>
      <div class="section-label">相性に注意のナンバー</div>
      <p><span style="color:#f472b6">△ ${info.badMatch.join(', ')}</span></p>
      <p style="font-size:0.8rem">${info.badMatchWhy}</p>
      <div class="section-label">同じナンバーの有名人</div>
      <ul>${info.celebrities.map(c => '<li>' + c + '</li>').join('')}</ul>
      <div class="section-label">ラッキーカラー</div>
      <p>${info.luckyColor}</p>
    `;
  }

  result.classList.add('show');
  updateShareLinks(sum, info);
}

function updateShareLinks(num, info) {
  const isMaster = [11, 22, 33].includes(num);
  const masterText = isMaster ? '✨マスターナンバー✨' : '';
  const text = `🔮 私のエンジェルナンバーは【${num}】${masterText}\n${info.title}\n\nあなたも調べてみて！`;
  const url = 'https://mochibullet.github.io/angel-number/';

  document.getElementById('shareX').href =
    `https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;

  document.getElementById('shareLine').href =
    `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
}

function copyResult() {
  const num = document.getElementById('number').textContent;
  const info = meanings[parseInt(num)];
  if (!info) return;
  const isMaster = [11, 22, 33].includes(parseInt(num));
  const masterText = isMaster ? ' ✨マスターナンバー✨' : '';
  const text = `🔮 私のエンジェルナンバーは【${num}】${masterText}\n${info.title}\n\nあなたも調べてみて！\nhttps://mochibullet.github.io/angel-number/`;

  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

// Enter key support
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
});
